<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="sidebar">
    <h3 style="padding:15px;">Admin Panel</h3>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="transactions.html">Transactions</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
  <div class="main-content">
    <h2>Dashboard</h2>
    <div class="dashboard-grid">

      <div class="card"><h3>Total Sales</h3><span id="totalSales">0</span></div>

    <div class="card">
      <h3>Recent Transactions</h3>
      <table>
        <thead><tr><th>Date</th><th>Items</th><th>Total</th><th>Method</th></tr></thead>
        <tbody id="recentTxBody"></tbody>
      </table>
    </div>
  </div>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script src="../assets/js/ai-chat.js"></script>
  <script type="module">
    import { initFCM } from '../assets/js/fcm.js';
    initFCM();
  </script>
