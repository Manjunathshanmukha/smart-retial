<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Retail - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h2>Smart Retail</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <div id="errorMsg" style="color:red; margin-top:10px;"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyArjZp9ZL0FEHyC81--e2EY0WeqBuRkKyQ",
      authDomain: "smart-retail-automation.firebaseapp.com",
      projectId: "smart-retail-automation",
      storageBucket: "smart-retail-automation.firebasestorage.app",
      messagingSenderId: "775850945596",
      appId: "1:775850945596:web:8681d22dddd25b72f26739",
      measurementId: "G-EX9CCY7DHP"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const idToken = await userCred.user.getIdToken();
        localStorage.setItem('token', idToken);

        // Simple role routing: admin@... -> admin panel, else user panel
        if (email.startsWith('admin@')) {
          window.location.href = 'admin/dashboard.html';
        } else {
          window.location.href = 'user/billing.html';
        }
      } catch (error) {
        document.getElementById('errorMsg').innerText = error.message;
      }
    });
  </script>
</body>
</html>
